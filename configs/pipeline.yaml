# Pipeline 方法超参数配置
# 方法：先 NER（Bert-BiLSTM-CRF）后 RE（Bert 分类器）

seed: 42

data:
  # 预处理后数据目录（由 scripts/preprocess.py 生成）
  processed_dir: "data/processed/pipeline"
  # 共用的关系映射文件
  rel2id: "data/processed/shared/rel2id.json"
  # 实体类型映射文件
  entity2id: "data/processed/shared/entity2id.json"

ner:
  # BERT 预训练模型路径或 HuggingFace 模型名
  # 优先使用本地路径：methods/pipeline/ner/model/
  bert_model: "methods/pipeline/ner/model"
  # BERT 编码器学习率
  learning_rate: 3.0e-5
  # CRF 层学习率（仅 use_crf=true 时有效）
  crf_lr: 1.0e-3
  batch_size: 16
  max_length: 128
  epochs: 15
  dropout: 0.1
  # 早停耐心值
  patience: 10
  # 最佳模型保存路径
  checkpoint: "results/pipeline/ner_best.pt"

  # 消融实验参数
  use_bilstm: true      # 是否使用 BiLSTM 层（false = BERT-CRF）
  use_crf: true         # 是否使用 CRF 层（false = BERT-Linear/Softmax）

re:
  # BERT 预训练模型路径或 HuggingFace 模型名
  bert_model: "hfl/chinese-bert-wwm"
  # BERT 层学习率
  bert_lr: 3.0e-5
  # 非 BERT 层（线性头）学习率（暂未差分，保留备用）
  other_lr: 3.0e-4
  train_batch_size: 32
  eval_batch_size: 12
  max_seq_len: 256
  epochs: 15
  dropout: 0.1
  # 早停耐心值（连续 patience 个 epoch 验证集 F1 不提升则停止）
  patience: 5
  # 注：关系类别数由 rel2id 文件动态计算，无需在此硬编码
  # 最佳模型保存路径
  checkpoint: "results/pipeline/re_best.pt"

output:
  dir: "results/pipeline"
  predictions: "results/pipeline/predictions.jsonl"
  metrics: "results/pipeline/metrics.json"
  error_report: "results/pipeline/error_report.txt"
  log: "results/pipeline/train.log"
  # 消融实验：可覆盖输出目录避免覆盖基准模型
  # 例如：ablation_dir: "results/pipeline_ablation1"
  ablation_dir: null
