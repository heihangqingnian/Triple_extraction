# Pipeline 消融实验 1：去除 BiLSTM（BERT-CRF）
# 验证 BERT 编码能力能否替代 BiLSTM 的序列建模能力

seed: 42

data:
  processed_dir: "data/processed/pipeline"
  rel2id: "data/processed/shared/rel2id.json"
  entity2id: "data/processed/shared/entity2id.json"

ner:
  bert_model: "methods/pipeline/ner/model"
  learning_rate: 3.0e-5
  crf_lr: 1.0e-3
  batch_size: 16
  max_length: 128
  epochs: 15
  dropout: 0.1
  patience: 10
  checkpoint: "results/pipeline_ablation1/ner_best.pt"
  use_bilstm: false  # 消融：不使用 BiLSTM
  use_crf: true     # 保留 CRF

re:
  bert_model: "hfl/chinese-bert-wwm"
  bert_lr: 3.0e-5
  other_lr: 3.0e-4
  train_batch_size: 32
  eval_batch_size: 12
  max_seq_len: 256
  epochs: 15
  dropout: 0.1
  patience: 5
  checkpoint: "results/pipeline_ablation1/re_best.pt"

output:
  dir: "results/pipeline_ablation1"
  predictions: "results/pipeline_ablation1/predictions.jsonl"
  metrics: "results/pipeline_ablation1/metrics.json"
  error_report: "results/pipeline_ablation1/error_report.txt"
  log: "results/pipeline_ablation1/train.log"