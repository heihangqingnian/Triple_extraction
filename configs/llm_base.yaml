# LLM 方法配置 - Base LoRA 变体
# 对应训练策略：基础 Prompt（无 Schema 约束，无 CoT）
# 使用方法：
#   python main.py --method llm --mode predict  --config configs/llm_base.yaml
#   python main.py --method llm --mode evaluate --config configs/llm_base.yaml

seed: 42

model:
  base_model: "ZhipuAI/chatglm2-6b"
  lora_weights: "models/chatglm2-lora-base"
  prompt_type: "base"
  max_new_tokens: 512
  temperature: 0.1
  device: "auto"

data:
  test_file: "data/processed/llm/test_base.json"
  predictions_file: "results/llm/base/predictions_base.jsonl"

inference:
  per_sample_timeout: 60  # 单条样本最大推理时间（秒），0 表示不限制

output:
  dir: "results/llm/base"
  predictions: "results/llm/base/predictions_base.jsonl"
  metrics: "results/llm/base/metrics_base.json"
  error_report: "results/llm/base/error_report_base.txt"
  log: "results/llm/base/infer_base.log"
