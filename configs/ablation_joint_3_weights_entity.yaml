# CasRel 消融实验 3a：损失权重 - 侧重实体
# L_total = 2.0*L_subject + 1.0*L_object_relation

seed: 42

data:
  processed_dir: "data/processed/joint"
  rel2id: "data/processed/joint/rel2id.json"
  train_prefix: "train"
  dev_prefix: "dev"
  test_prefix: "test"

model:
  bert_model: "methods/pipeline/ner/model"
  learning_rate: 1.0e-5
  batch_size: 64
  max_length: 256
  epochs: 300
  eval_every: 5
  log_every: 50
  threshold: 0.5
  rel_num: 49
  multi_gpu: false
  patience: 7
  checkpoint: "results/joint_ablation3/best.pt"
  use_subject_feedback: true   # 保留主实体反馈
  dual_encoder: false           # 使用共享单编码器
  loss_alpha: 1.333             # 消融：侧重实体（比例 2:1，alpha+beta=2.0 与基线对齐）
  loss_beta: 0.667

output:
  dir: "results/joint_ablation3"
  predictions: "results/joint_ablation3/predictions.jsonl"
  metrics: "results/joint_ablation3/metrics.json"
  error_report: "results/joint_ablation3/error_report.txt"
  log: "results/joint_ablation3/train.log"