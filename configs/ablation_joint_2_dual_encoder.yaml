# CasRel 消融实验 2：双独立 BERT 编码器
# 分析多任务学习增益与任务负迁移问题

seed: 42

data:
  processed_dir: "data/processed/joint"
  rel2id: "data/processed/shared/rel2id.json"
  train_prefix: "train"
  dev_prefix: "dev"
  test_prefix: "test"

model:
  bert_model: "methods/pipeline/ner/model"
  learning_rate: 1.0e-5
  batch_size: 6
  max_length: 256
  epochs: 300
  eval_every: 5
  log_every: 50
  threshold: 0.5
  rel_num: 49
  multi_gpu: false
  patience: 7
  checkpoint: "results/joint_ablation2/best.pt"
  use_subject_feedback: true   # 保留主实体反馈
  dual_encoder: true            # 消融：使用双独立编码器
  loss_alpha: 1.0
  loss_beta: 1.0

output:
  dir: "results/joint_ablation2"
  predictions: "results/joint_ablation2/predictions.jsonl"
  metrics: "results/joint_ablation2/metrics.json"
  error_report: "results/joint_ablation2/error_report.txt"
  log: "results/joint_ablation2/train.log"