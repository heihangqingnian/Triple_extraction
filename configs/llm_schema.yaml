# LLM 方法配置 - Schema LoRA 变体
# 对应训练策略：加入 Schema 约束（明确告知实体类型和关系类型列表）
# 使用方法：
#   python main.py --method llm --mode predict  --config configs/llm_schema.yaml
#   python main.py --method llm --mode evaluate --config configs/llm_schema.yaml

seed: 42

model:
  base_model: "ZhipuAI/chatglm2-6b"
  lora_weights: "models/chatglm2-lora-schema"
  prompt_type: "schema"
  max_new_tokens: 512
  temperature: 0.1
  device: "auto"

data:
  test_file: "data/processed/llm/test_schema.json"
  predictions_file: "results/llm/schema/predictions_schema.jsonl"

inference:
  per_sample_timeout: 60  # 单条样本最大推理时间（秒），0 表示不限制

output:
  dir: "results/llm/schema"
  predictions: "results/llm/schema/predictions_schema.jsonl"
  metrics: "results/llm/schema/metrics_schema.json"
  error_report: "results/llm/schema/error_report_schema.txt"
  log: "results/llm/schema/infer_schema.log"
