# LLM 方法配置 — 最终测试推理与评估（单 Prompt / 单 LoRA）
#
# 流程：
#   1. python scripts/prompt_search.py --config configs/llm_prompt_search.yaml   # 免训练选最优 Prompt
#   2. python scripts/build_llm_dataset.py --prompt <best> --split all           # 构造 train.json / test.json
#   3. 在 LLaMA-Factory 中用 train.json 微调出单一 LoRA（template=chatglm2）
#   4. python main.py --method llm --mode predict      # 基座+单 LoRA 在测试集推理
#      python main.py --method llm --mode evaluate     # ComprehensiveMetrics 评估（与基线一致）

seed: 42

model:
  base_model: "ZhipuAI/chatglm2-6b"
  # 单一 LoRA 权重目录（LLaMA-Factory 微调产物）；不存在则回退基座推理
  lora_weights: "models/chatglm2-lora"
  max_new_tokens: 512
  temperature: 0.1
  device: "auto"

data:
  # 由 build_llm_dataset.py 用「最优 Prompt」生成，含 system/instruction/output 字段
  test_file: "data/processed/llm/test_fs2.json"

inference:
  per_sample_timeout: 60 # 单条样本最大推理时间（秒），0 表示不限制

output:
  dir: "results/llm"
  predictions: "results/llm/predictions.jsonl"
  metrics: "results/llm/metrics.json"
  error_report: "results/llm/error_report.txt"
  log: "results/llm/infer.log"
